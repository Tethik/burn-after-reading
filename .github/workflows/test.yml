name: Test

on:
  push:
    branches: [ "master" ]
    tags: [ '*.*.*' ]
  pull_request:
    branches: [ "master" ]

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b          

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest
